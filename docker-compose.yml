services:
  postgres:
    image: postgres:16-alpine
    container_name: agentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentflow}
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow} -d ${POSTGRES_DB:-agentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentflow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agentflow}
      DATABASE_USERNAME: ${POSTGRES_USER:-agentflow}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-agentflow}
      ORCHESTRATOR_BASE_URL: http://orchestrator:8000
    ports:
      - "8080:8080"

  orchestrator:
    profiles:
      - future
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: agentflow-orchestrator
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-replace-me}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-70b-versatile}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"

  frontend:
    profiles:
      - future
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:5173"

volumes:
  postgres_data:
