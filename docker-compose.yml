services:
  postgres:
    image: postgres:16-alpine
    container_name: agentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentflow}
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow} -d ${POSTGRES_DB:-agentflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentflow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-agentflow}
      DATABASE_USERNAME: ${POSTGRES_USER:-agentflow}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-agentflow}
      ORCHESTRATOR_BASE_URL: http://orchestrator:8000
    ports:
      - "8080:8080"

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: agentflow-orchestrator
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-replace-me}
      GROQ_MODEL: ${GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      GROQ_FALLBACK_MODELS: ${GROQ_FALLBACK_MODELS:-llama-3.3-70b-versatile,llama-3.1-8b-instant}
      AGENTFLOW_TOOL_WORKDIR: /app/tool-workspace
      AGENTFLOW_TOOL_MAX_READ_BYTES: ${AGENTFLOW_TOOL_MAX_READ_BYTES:-65536}
      ORCHESTRATOR_PUBLIC_BASE_URL: ${ORCHESTRATOR_PUBLIC_BASE_URL:-http://localhost:8000}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-8}
      HF_TOKEN: ${HF_TOKEN:-replace-me}
      HF_IMAGE_PROVIDER: ${HF_IMAGE_PROVIDER:-wavespeed}
      HF_IMAGE_MODEL: ${HF_IMAGE_MODEL:-black-forest-labs/FLUX.1-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ${AGENTFLOW_HOST_TOOL_WORKDIR:-./tool-workspace}:/app/tool-workspace

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentflow-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:5173"

volumes:
  postgres_data:
