spring:
  application:
    name: agentflow
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/agentflow}
    username: ${DATABASE_USERNAME:${POSTGRES_USER:agentflow}}
    password: ${DATABASE_PASSWORD:${POSTGRES_PASSWORD:agentflow}}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
